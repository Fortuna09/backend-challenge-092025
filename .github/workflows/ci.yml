name: ci

on:
  push:
    branches:
      - main
      - feat/**
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: checkout codigo
        uses: actions/checkout@v4

      - name: configurar python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: checagem de compilacao
        run: python -m compileall .

  unit-tests:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: checkout codigo
        uses: actions/checkout@v4

      - name: configurar python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: executar testes unitarios
        env:
          PYTHONPATH: .
        run: python -m pytest -q tests/test_analyzer.py

  performance-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    continue-on-error: true
    steps:
      - name: checkout codigo
        uses: actions/checkout@v4

      - name: configurar python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: executar testes de performance
        env:
          RUN_PERF: "1"
          PYTHONPATH: .
        run: python -m pytest -q tests/test_performance.py
